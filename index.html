<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14141c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PR早見帳">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<title>PR早見帳 — Premiere Pro ショートカット & 便利ワザ</title>
<style>
  :root {
    --bg: #14141c;
    --bg2: #1c1c28;
    --card: #232333;
    --card2: #2b2b40;
    --line: #34344c;
    --text: #eceaf6;
    --sub: #9d9ab5;
    --accent: #b3a4ff;      /* AEっぽい紫 */
    --accent2: #64d8cb;
    --kbd-bg: #32324a;
    --kbd-line: #4a4a68;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", Meiryo, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    padding-bottom: calc(24px + var(--safe-bottom));
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 14px; }

  /* ===== ヘッダー ===== */
  header {
    position: sticky; top: 0; z-index: 50;
    background: linear-gradient(180deg, rgba(20,20,28,.98), rgba(20,20,28,.92));
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding-top: var(--safe-top);
  }
  .head-top {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px 4px;
    max-width: 560px; margin: 0 auto;
  }
  .logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: #33206b;
    color: var(--accent);
    font-weight: 800; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #6a4bd6;
    flex: none;
  }
  h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: .02em; }
  h1 small { display: block; font-size: 10.5px; color: var(--sub); font-weight: 500; }

  .os-toggle {
    margin-left: auto; flex: none;
    display: flex; background: var(--card); border: 1px solid var(--line);
    border-radius: 99px; padding: 3px; gap: 2px;
  }
  .os-toggle button {
    border: 0; background: transparent; color: var(--sub);
    font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 99px;
    cursor: pointer;
  }
  .os-toggle button.on { background: var(--accent); color: #17142e; }

  .searchbar { padding: 8px 14px 10px; max-width: 560px; margin: 0 auto; }
  .searchbar input {
    width: 100%; padding: 10px 14px;
    border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); color: var(--text);
    font-size: 15px; outline: none;
  }
  .searchbar input:focus { border-color: var(--accent); }
  .searchbar input::placeholder { color: #6f6c8a; }

  /* ===== タブ ===== */
  .tabs {
    display: flex; max-width: 560px; margin: 0 auto; padding: 0 14px;
  }
  .tabs button {
    flex: 1 1 auto; background: none; border: 0; color: var(--sub);
    font-size: 12.5px; font-weight: 700; padding: 10px 2px 12px;
    white-space: nowrap;
    border-bottom: 3px solid transparent; cursor: pointer;
  }
  .tabs button.on { color: var(--text); border-bottom-color: var(--accent); }

  /* ===== カテゴリチップ ===== */
  .chips {
    display: flex; gap: 8px; overflow-x: auto; padding: 14px 14px 4px;
    max-width: 560px; margin: 0 auto;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chips button {
    flex: none; border: 1px solid var(--line); background: var(--card);
    color: var(--sub); font-size: 12.5px; font-weight: 600;
    padding: 6px 13px; border-radius: 99px; cursor: pointer;
  }
  .chips button.on { background: var(--accent); border-color: var(--accent); color: #17142e; }

  /* ===== 並び順切替 ===== */
  .sortbar {
    display: flex; align-items: center; gap: 6px;
    max-width: 560px; margin: 0 auto; padding: 10px 14px 0;
  }
  .sort-label { font-size: 11px; color: var(--sub); font-weight: 700; margin-right: 2px; }
  .sortbar button {
    border: 1px solid var(--line); background: var(--card);
    color: var(--sub); font-size: 12px; font-weight: 700;
    padding: 5px 12px; border-radius: 99px; cursor: pointer;
  }
  .sortbar button.on { background: var(--card2); border-color: var(--accent); color: var(--text); }

  /* ===== リスト・カード ===== */
  .list { padding-top: 4px; }
  .cat-head {
    font-size: 13.5px; font-weight: 800; color: var(--text);
    margin: 22px 2px 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--line);
  }
  .cat-head .count { color: var(--sub); font-weight: 700; font-size: 11px; margin-left: 4px; }
  .cat-head.tier { color: var(--accent); border-bottom-color: transparent; font-size: 12px; letter-spacing: .1em; padding-bottom: 0; }
  .hot-stars { color: #f2a65a; font-size: 10px; letter-spacing: .1em; vertical-align: 2px; margin-left: 2px; }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
  }
  .sc-row { display: flex; align-items: center; gap: 10px; }
  .sc-name { font-weight: 700; font-size: 14.5px; }
  .sc-desc { color: var(--sub); font-size: 12.5px; margin-top: 2px; }
  .sc-keys { margin-left: auto; flex: none; display: flex; gap: 3px; align-items: center; }
  kbd {
    display: inline-block; min-width: 22px; text-align: center;
    background: var(--kbd-bg); border: 1px solid var(--kbd-line);
    border-bottom-width: 2.5px;
    border-radius: 6px; padding: 3px 7px;
    font: 700 12px/1.3 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: #cfc9ff;
  }
  .plus { color: #5f5c7d; font-size: 11px; font-weight: 700; }

  .empty { text-align: center; color: var(--sub); padding: 50px 0; font-size: 14px; }

  /* ===== エクスプレッションカード ===== */
  .ex-card { padding: 0; overflow: hidden; }
  .ex-head { padding: 13px 14px; cursor: pointer; }
  .ex-title { display: flex; align-items: center; gap: 8px; }
  .ex-title .ex-name { font-weight: 800; font-size: 15.5px; }
  .ex-badge {
    font-size: 10px; font-weight: 800; color: var(--accent2);
    border: 1px solid rgba(100,216,203,.4); border-radius: 6px;
    padding: 1px 7px; letter-spacing: .05em;
  }
  .ex-tag { color: var(--sub); font-size: 12.5px; margin-top: 3px; }
  .ex-caret { margin-left: auto; color: #5f5c7d; transition: transform .2s; font-size: 12px; }
  .ex-card.open .ex-caret { transform: rotate(90deg); }

  .ex-body { display: none; border-top: 1px solid var(--line); padding: 13px 14px 15px; }
  .ex-card.open .ex-body { display: block; }

  .ex-code {
    position: relative;
    background: #101018; border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 13px; margin: 2px 0 12px;
    font: 600 13px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: #b7e6a5; overflow-x: auto; white-space: pre;
  }
  .copy-btn {
    position: absolute; top: 7px; right: 7px;
    background: var(--card2); color: var(--sub);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 11px; font-weight: 700; padding: 4px 10px; cursor: pointer;
  }
  .copy-btn.done { color: var(--accent2); border-color: var(--accent2); }

  .ex-kid {
    background: rgba(154,140,255,.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 10px 12px; font-size: 13.5px; margin-bottom: 12px;
  }
  .ex-kid b { color: var(--accent); }

  .ex-ai {
    background: rgba(255, 145, 200, .07);
    border-left: 3px solid #ff91c8;
    border-radius: 0 10px 10px 0;
    padding: 10px 12px; font-size: 12.5px; margin-bottom: 12px;
  }
  .ex-ai .ai-t { font-weight: 800; color: #ff9ecf; font-size: 12px; margin-bottom: 4px; }
  .ex-ai .ai-text { color: var(--sub); line-height: 1.75; }
  .ex-ai .ai-copy {
    display: block; width: 100%; margin-top: 8px;
    background: rgba(255,145,200,.12); border: 1px solid rgba(255,145,200,.4);
    color: #ffb9dc; font-size: 12px; font-weight: 700;
    border-radius: 8px; padding: 7px 0; cursor: pointer;
  }
  .ex-ai .ai-copy.done { color: var(--accent2); border-color: var(--accent2); }

  .ex-combo {
    background: rgba(100,216,203,.07);
    border-left: 3px solid var(--accent2);
    border-radius: 0 10px 10px 0;
    padding: 10px 12px; font-size: 13px; margin-bottom: 12px;
  }
  .ex-combo .combo-t { font-weight: 800; color: var(--accent2); font-size: 12px; margin-bottom: 4px; }
  .ex-combo ul { margin: 0; padding-left: 18px; }
  .ex-combo li { margin: 4px 0; }
  .ex-combo code, .ex-kid code {
    background: #101018; border: 1px solid var(--line); border-radius: 5px;
    padding: 1px 5px; font-size: 12px; color: #b7e6a5;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  .gem-badge {
    display: inline-block; font-size: 10px; font-weight: 800;
    color: #ffd166; border: 1px solid rgba(255,209,102,.45);
    border-radius: 6px; padding: 0 6px; vertical-align: 2px;
    letter-spacing: .02em;
  }
  .mini-cat {
    display: inline-block; font-size: 10px; color: var(--sub);
    border: 1px solid var(--line); border-radius: 5px;
    padding: 0 5px; font-weight: 600; vertical-align: 2px; margin-left: 2px;
  }

  /* ===== お気に入り・カードリンク ===== */
  .fav-btn {
    background: none; border: 0; font-size: 19px; color: #4a4a68;
    cursor: pointer; padding: 2px 4px; flex: none; line-height: 1;
  }
  .fav-btn.on { color: #ffd166; }
  .link-btn {
    position: absolute; top: 7px; right: 66px;
    background: var(--card2); color: var(--sub);
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 11px; font-weight: 700; padding: 4px 8px; cursor: pointer;
  }
  .link-btn.done { color: var(--accent2); border-color: var(--accent2); }

  /* ===== クイズ ===== */
  .quiz-hero { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .quiz-lead { color: var(--sub); font-size: 13px; margin: 0 0 6px; }
  .quiz-prog { font-size: 11px; color: var(--sub); font-weight: 700; letter-spacing: .08em; margin-bottom: 6px; }
  .quiz-q { font-size: 16px; font-weight: 800; margin: 4px 0 2px; }
  .quiz-hint { color: var(--sub); font-size: 12px; margin-bottom: 8px; }
  .quiz-choice {
    display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap;
    margin-top: 10px; padding: 13px 10px; border-radius: 12px;
    background: var(--bg2); border: 1px solid var(--line);
    font-size: 14px; font-weight: 700; cursor: pointer; text-align: center;
  }
  .quiz-choice.ok { border-color: #4ade80; background: rgba(74,222,128,.12); }
  .quiz-choice.ng { border-color: #f87171; background: rgba(248,113,113,.12); opacity: .85; }
  .quiz-mode-btn, .quiz-next {
    display: block; width: 100%; margin-top: 10px; padding: 12px 0; border-radius: 12px;
    background: var(--card2); border: 1px solid var(--kbd-line); color: var(--text);
    font-size: 14px; font-weight: 800; cursor: pointer;
  }
  .quiz-next { background: var(--accent); border-color: var(--accent); color: #17142e; }
  .quiz-result { text-align: center; padding: 10px 14px 16px; }
  .quiz-score { font-size: 44px; font-weight: 800; color: var(--accent); margin: 6px 0 0; }
  .quiz-msg { font-weight: 700; margin: 6px 0 14px; }

  .demo-wrap { margin-top: 4px; }
  .demo-stage {
    position: relative; height: 120px;
    background:
      linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px),
      #101018;
    background-size: 20px 20px, 20px 20px, auto;
    border: 1px solid var(--line); border-radius: 10px;
    overflow: hidden;
  }
  .demo-ball {
    position: absolute; width: 26px; height: 26px; border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, #c9beff, var(--accent) 60%, #6f5fe0);
    box-shadow: 0 3px 12px rgba(154,140,255,.45);
    top: 0; left: 0;
    will-change: transform;
  }
  .demo-ball.b2 { background: radial-gradient(circle at 32% 30%, #b8f4ec, var(--accent2) 60%, #35a99c); box-shadow: 0 3px 12px rgba(100,216,203,.4); }
  .demo-ball.b3 { background: radial-gradient(circle at 32% 30%, #ffd9a8, #f2a65a 60%, #cf7f34); box-shadow: 0 3px 12px rgba(242,166,90,.4); }
  .demo-ball.square { border-radius: 7px; }
  .demo-ghost { opacity: .35; }
  .demo-label {
    position: absolute; bottom: 6px; left: 10px;
    font-size: 10.5px; color: #6f6c8a; font-weight: 600; pointer-events: none;
  }
  .demo-btn {
    margin-top: 9px; width: 100%;
    background: var(--card2); border: 1px solid var(--kbd-line);
    color: var(--text); font-size: 13px; font-weight: 800;
    border-radius: 10px; padding: 9px 0; cursor: pointer;
  }
  .demo-btn.playing { background: var(--accent); border-color: var(--accent); color: #17142e; }

  footer { text-align: center; color: #5f5c7d; font-size: 11.5px; margin-top: 34px; }
</style>
</head>
<body>

<header>
  <div class="head-top">
    <div class="logo">Pr</div>
    <h1>PR早見帳<small>Premiere Pro ショートカット & 便利ワザ（齋藤さん専用キー）</small></h1>
  </div>
  <div class="searchbar">
    <input id="search" type="search" placeholder="キーワードで検索（例: カット, インサート, 書き出し, F）" autocomplete="off">
  </div>
  <nav class="tabs" id="tabs">
    <button data-tab="shortcuts" class="on">⌨️ ショートカット</button>
    <button data-tab="tips">💡 便利ワザ</button>
    <button data-tab="quiz">🎯 クイズ</button>
  </nav>
</header>

<div class="chips" id="chips"></div>

<div class="sortbar" id="sortbar">
  <span class="sort-label">並び順</span>
  <button data-sort="cat" class="on">カテゴリごと</button>
  <button data-sort="hot">よく使う順</button>
</div>

<main class="wrap">
  <div class="list" id="list"></div>
  <footer></footer>
</main>

const MODS = '⌃⌥⇧⌘';
function keyHtml(combo){
  let i=0; const parts=[];
  while(i<combo.length && MODS.includes(combo[i])){ parts.push(combo[i]); i++; }

  if (rest) parts.push(rest);

  return parts.map(k=>`<kbd>${k}</kbd>`).join('<span class="plus">+</span>');
}

const sortByHot = items => items.slice().sort((a,b)=>hotOf(b)-hotOf(a));
const CAT_ICON = {
  'CAMP標準':'🏕','基本操作':'🧰','ファイル・プロジェクト':'📁','ツール':'🛠️','再生・ナビ':'▶️',
  'イン/アウト・トリム':'✂️','編集（クリップ）':'🎬','タイムライン・トラック':'📊',
  'マーカー':'📍','マルチカム':'🎥','ラベル・整理':'🏷️','オーディオ':'🔊',
  'トランジション':'🌫️','エフェクト・カラー':'🎨','書き出し':'📤','パネル・画面':'🖥️',
  '時短ワークフロー':'⚡','テロップ・グラフィック':'🔤','音・BGM':'🎵','カラー':'🎨','メンテナンス':'🧰',
};
const catLabel = c => `${CAT_ICON[c]||'■'} ${c}`;
const catOrderOf = arr => { const m=new Map(); arr.forEach(x=>{ if(!m.has(x.cat)) m.set(x.cat,m.size); }); return m; };
const SC_CAT_ORDER = catOrderOf(SHORTCUTS);
const TIP_CAT_ORDER = catOrderOf(TIPS);
function arrange(items, order){
  return state.sort==='hot' ? sortByHot(items)
    : items.slice().sort((a,b)=>(order.get(a.cat)-order.get(b.cat))||(hotOf(b)-hotOf(a)));
}
function headOf(item, byTier, counts){
  if (byTier && state.sort==='hot') return { key:TIER_LABEL[hotOf(item)], html:`<div class="cat-head tier">${TIER_LABEL[hotOf(item)]}</div>` };
  return { key:item.cat, html:`<div class="cat-head">${catLabel(item.cat)}<span class="count">(${counts.get(item.cat)})</span></div>` };
}
const countByCat = items => items.reduce((m,x)=>m.set(x.cat,(m.get(x.cat)||0)+1), new Map());
const hotStars = x => hotOf(x)===3 ? ' <span class="hot-stars">★★★</span>' : '';

function renderShortcuts(){
  const favView = state.cat==='★', gemView = state.cat==='💡';
  const byTier = state.cat==='すべて' || favView || gemView;
  const items = arrange(SHORTCUTS.filter(s =>
    (favView ? FAVS.has('s:'+s.name) : gemView ? s.gem : (byTier || s.cat===state.cat)) &&
    match(s, ['name','desc','mac','cat'])), SC_CAT_ORDER);
  if (!items.length){ $list.innerHTML = `<div class="empty">${favView&&!state.query?'各項目の ★ を押すと、ここに自分専用の早見帳が作れます':'見つかりませんでした 🔍'}</div>`; return; }
  const counts = countByCat(items); let html='', lastHead='';
  for (const s of items){
    const head = headOf(s, byTier, counts);
    if (head.key!==lastHead){ html+=head.html; lastHead=head.key; }
    html += `
      <div class="card sc-card">
        <div class="sc-row">
          <div>
            <div class="sc-name">${s.name}${hotStars(s)}${s.gem?' <span class="gem-badge">💡目から鱗</span>':''}${byTier&&state.sort==='hot'?` <span class="mini-cat">${s.cat}</span>`:''}</div>
            <div class="sc-desc">${s.desc}</div>
          </div>
          <div class="sc-keys">${keyHtml(s.mac)}</div>
          <button class="fav-btn ${FAVS.has('s:'+s.name)?'on':''}" data-key="s:${attr(s.name)}" aria-label="お気に入り">★</button>
        </div>
      </div>`;
  }
  $list.innerHTML = html;
}

function renderTips(){
  const favView = state.cat==='★', gemView = state.cat==='💡';
  const byTier = state.cat==='すべて' || favView || gemView;
  const items = arrange(TIPS.filter(e =>
    (favView ? FAVS.has('t:'+e.name) : gemView ? e.gem : (byTier || e.cat===state.cat)) &&
    match(e, ['name','tag','kid','cat','combo','code'])), TIP_CAT_ORDER);
  if (!items.length){ $list.innerHTML = `<div class="empty">${favView&&!state.query?'各項目の ★ を押すと、ここに自分専用の便利ワザ集が作れます':'見つかりませんでした 🔍'}</div>`; return; }
  const counts = countByCat(items); let html='', lastHead='';
  items.forEach(e => {
    const i = TIPS.indexOf(e);
    const head = headOf(e, byTier, counts);
    if (head.key!==lastHead){ html+=head.html; lastHead=head.key; }
    html += `
      <div class="card ex-card" data-i="${i}" id="${slugOf(e.name)}">
        <div class="ex-head">
          <div class="ex-title">
            <span class="ex-name">${e.name}${hotStars(e)}</span>
            ${e.badge?`<span class="ex-badge">${e.badge}</span>`:''}${e.gem?'<span class="gem-badge">💡目から鱗</span>':''}
            <button class="fav-btn ${FAVS.has('t:'+e.name)?'on':''}" data-key="t:${attr(e.name)}" aria-label="お気に入り" style="margin-left:auto">★</button>
            <span class="ex-caret" style="margin-left:0">▶</span>
          </div>
          <div class="ex-tag">${e.tag}</div>
        </div>
        <div class="ex-body">
          ${e.code?`<div class="ex-code">${e.code}<button class="link-btn" data-slug="${slugOf(e.name)}">🔗</button><button class="copy-btn">コピー</button></div>`:''}
          <div class="ex-kid">${e.kid}</div>
          ${e.combo?`<div class="ex-combo"><div class="combo-t">🧩 手順・コツ</div><ul>${e.combo.map(c=>`<li>${c}</li>`).join('')}</ul></div>`:''}
          ${e.ai?`<div class="ex-ai"><div class="ai-t">🤖 うまくいかない時は、AIにこう聞こう</div><div class="ai-text">${e.ai}</div><button class="ai-copy">質問文をコピーする（【 】を書き換えて送信）</button></div>`:''}
        </div>
      </div>`;
  });
  $list.innerHTML = html;
}

function render(){
  renderChips();
  const isQuiz = state.tab==='quiz';
  document.querySelector('.searchbar').style.display = isQuiz?'none':'';
  document.getElementById('sortbar').style.display = isQuiz?'none':'';
  if (isQuiz) renderQuiz();
  else (state.tab==='shortcuts' ? renderShortcuts : renderTips)();
}

/* ===== クイズ ===== */
let quiz = null;
const shuffle = arr => arr.slice().sort(()=>Math.random()-0.5);
function buildQuiz(mode){
  const scQ = s => {
    const pool = shuffle([...new Set(SHORTCUTS.map(x=>x.mac))].filter(k=>k!==s.mac)).slice(0,3);
    return { text:`「${s.name}」のショートカットは？`, hint:s.desc, answer:s.mac, choices:shuffle([s.mac,...pool]), isKey:true };
  };
  const tipQ = x => {
    const pool = shuffle(TIPS.filter(y=>y!==x)).slice(0,3).map(y=>y.name);
    return { text:`「${x.tag}」— どの便利ワザ？`, hint:'', answer:x.name, choices:shuffle([x.name,...pool]), isKey:false };
  };
  const qs = mode==='sc' ? shuffle(SHORTCUTS).slice(0,10).map(scQ)
    : mode==='tip' ? shuffle(TIPS).slice(0,Math.min(10,TIPS.length)).map(tipQ)
    : shuffle([...shuffle(SHORTCUTS).slice(0,7).map(scQ), ...shuffle(TIPS).slice(0,3).map(tipQ)]);
  quiz = { mode, qs, i:0, score:0, answered:false };
}
function renderQuiz(){
  if (!quiz){
    $list.innerHTML = `
      <div class="card" style="padding:16px 14px">
        <div class="quiz-hero">🎯 クイズで覚える</div>
        <p class="quiz-lead">ランダム出題。くり返すほど手が覚えます。<br>ショートカットは齋藤さんの<b>Premiere実キー</b>で出題されます。</p>
        <button class="quiz-mode-btn" data-mode="sc">⌨️ ショートカット 10問</button>
        <button class="quiz-mode-btn" data-mode="tip">💡 便利ワザ ${Math.min(10,TIPS.length)}問</button>
        <button class="quiz-mode-btn" data-mode="mix">🔀 ミックス 10問</button>
      </div>`;
    return;
  }
  if (quiz.i >= quiz.qs.length){
    const s=quiz.score, n=quiz.qs.length;
    const msg = s>=Math.ceil(n*0.9)?'満点級！手が完全に覚えてます 🏆':s>=Math.ceil(n*0.7)?'すごい！あと少しで満点 🔥':s>=Math.ceil(n*0.4)?'いい感じ！もう一周で定着 💪':'まずは「★★★ 超よく使う」から覚えよう 📖';
    $list.innerHTML = `
      <div class="card quiz-result">
        <div class="quiz-prog">RESULT</div>
        <div class="quiz-score"><span class="q-score">${s}</span> / ${n}</div>
        <div class="quiz-msg">${msg}</div>
        <button class="quiz-next" data-act="retry">🔁 もう一度（同じモード）</button>
        <button class="quiz-mode-btn" data-act="menu">モード選択にもどる</button>
      </div>`;
    return;
  }
  const q = quiz.qs[quiz.i];
  $list.innerHTML = `
    <div class="card quiz-wrap" style="padding:14px">
      <div class="quiz-prog">Q${quiz.i+1} / ${quiz.qs.length}　スコア ${quiz.score}</div>
      <div class="quiz-q">${q.text}</div>
      ${q.hint?`<div class="quiz-hint">ヒント: ${q.hint}</div>`:''}
      ${q.choices.map((c,ci)=>`<div class="quiz-choice" data-ci="${ci}">${q.isKey?keyHtml(c):c}</div>`).join('')}
      <div class="quiz-foot"></div>
    </div>`;
}
function answerQuiz(ci){
  const q = quiz.qs[quiz.i]; quiz.answered=true;
  const correct = q.choices[ci]===q.answer; if (correct) quiz.score++;
  document.querySelectorAll('.quiz-choice').forEach((el,idx)=>{
    if (q.choices[idx]===q.answer) el.classList.add('ok'); else if (idx===ci) el.classList.add('ng');
  });
  document.querySelector('.quiz-prog').textContent = `Q${quiz.i+1} / ${quiz.qs.length}　スコア ${quiz.score}`;
  const last = quiz.i===quiz.qs.length-1;
  document.querySelector('.quiz-foot').innerHTML = `<button class="quiz-next" data-act="next">${last?'結果を見る':'次の問題 →'}</button>`;
}

/* ===== イベント ===== */
$tabs.addEventListener('click', e => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn || btn.dataset.tab===state.tab) return;
  state.tab = btn.dataset.tab; state.cat='すべて';
  if (state.tab==='quiz') quiz=null;
  $tabs.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b===btn));
  render();
});
$chips.addEventListener('click', e => {
  const btn = e.target.closest('button[data-cat]'); if (!btn) return;
  state.cat = btn.dataset.cat; render();
});
document.getElementById('sortbar').addEventListener('click', e => {
  const btn = e.target.closest('button[data-sort]'); if (!btn || btn.dataset.sort===state.sort) return;
  state.sort = btn.dataset.sort;
  document.querySelectorAll('#sortbar button').forEach(b=>b.classList.toggle('on', b===btn));
  render();
});
let searchTimer;
$search.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{ state.query=$search.value.trim(); render(); }, 160);
});
function copyText(text){
  return (navigator.clipboard?navigator.clipboard.writeText(text):Promise.reject()).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
  });
}
$list.addEventListener('click', e => {
  const favBtn = e.target.closest('.fav-btn');
  if (favBtn){ e.stopPropagation(); toggleFav(favBtn.dataset.key);
    favBtn.classList.toggle('on', FAVS.has(favBtn.dataset.key));
    if (state.cat==='★') render(); return; }
  const modeBtn = e.target.closest('.quiz-mode-btn');
  if (modeBtn){ if (modeBtn.dataset.mode) buildQuiz(modeBtn.dataset.mode); else quiz=null; renderQuiz(); return; }
  const choice = e.target.closest('.quiz-choice');
  if (choice && quiz && !quiz.answered){ answerQuiz(Number(choice.dataset.ci)); return; }
  const nextBtn = e.target.closest('.quiz-next');
  if (nextBtn){ if (nextBtn.dataset.act==='retry') buildQuiz(quiz.mode); else { quiz.i++; quiz.answered=false; } renderQuiz(); return; }
  const linkBtn = e.target.closest('.link-btn');
  if (linkBtn){ e.stopPropagation();
    copyText(location.href.split('#')[0]+'#'+linkBtn.dataset.slug).finally(()=>{
      linkBtn.textContent='✓'; linkBtn.classList.add('done');
      setTimeout(()=>{ linkBtn.textContent='🔗'; linkBtn.classList.remove('done'); },1400); });
    return; }
  const copyBtn = e.target.closest('.copy-btn');
  if (copyBtn){ e.stopPropagation();
    const box = copyBtn.parentElement.cloneNode(true);
    box.querySelectorAll('button').forEach(b=>b.remove());
    copyText(box.textContent.trim()).finally(()=>{
      copyBtn.textContent='✓ OK!'; copyBtn.classList.add('done');
      setTimeout(()=>{ copyBtn.textContent='コピー'; copyBtn.classList.remove('done'); },1400); });
    return; }
  const aiBtn = e.target.closest('.ai-copy');
  if (aiBtn){ e.stopPropagation();
    copyText(aiBtn.parentElement.querySelector('.ai-text').textContent.trim()).finally(()=>{
      aiBtn.textContent='✓ コピーしました！AIチャットに貼って【 】を書き換えてください'; aiBtn.classList.add('done');
      setTimeout(()=>{ aiBtn.textContent='質問文をコピーする（【 】を書き換えて送信）'; aiBtn.classList.remove('done'); },2200); });
    return; }
  const head = e.target.closest('.ex-head');
  if (head){ head.parentElement.classList.toggle('open'); }
});

/* カード直リンク: #slug で該当便利ワザを開く */
function openFromHash(){
  const slug = decodeURIComponent(location.hash.slice(1)); if (!slug) return;
  const i = TIPS.findIndex(x=>slugOf(x.name)===slug); if (i<0) return;
  if (state.tab!=='tips'){ state.tab='tips'; state.cat='すべて';
    $tabs.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b.dataset.tab==='tips')); render(); }
  const card = document.querySelector(`.ex-card[data-i="${i}"]`);
  if (card && !card.classList.contains('open')){ card.classList.add('open');
    setTimeout(()=>card.scrollIntoView({block:'start',behavior:'smooth'}),80); }
}

/* 初期化 */
document.querySelector('footer').textContent = `PR早見帳 ${APP_VERSION} (${APP_DATE}) — ホーム画面に追加するとアプリのように使えます`;
render();
openFromHash();
window.addEventListener('hashchange', openFromHash);

</script>
</body>
</html>
